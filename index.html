<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Catatan Mobile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <script>
        const savedTheme = localStorage.getItem('appTheme') || 'light';
        document.documentElement.className = savedTheme === 'dark' ? 'theme-dark' : 'theme-light';
    </script>
</head>
<body> <div class="phone-container">
        <div class="overlay" id="overlay" onclick="closeAllMenus()"></div>

        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>Kategori</h3>
                <div class="settings-container">
                    <i class="fas fa-cog" onclick="toggleSettingsMenu(event)"></i>
                    <div class="dropdown-menu" id="settingsDropdown">
                        <div class="dropdown-item" onclick="changeTheme('dark')"><i class="fas fa-moon"></i> Tampilan Gelap</div>
                        <div class="dropdown-item" onclick="changeTheme('light')"><i class="fas fa-sun"></i> Tampilan Terang</div>
                    </div>
                </div>
            </div>
            <div class="menu-item active" onclick="filterCategory('all', this)">
                <div class="menu-item-left"><i class="far fa-file-alt"></i> Semua catatan</div>
                <div class="menu-count" id="count-all">0</div>
            </div>
            <div class="menu-item" onclick="filterCategory('Favorit', this)">
                <div class="menu-item-left"><i class="far fa-star"></i> Favorit</div>
                <div class="menu-count" id="count-fav">0</div>
            </div>
            <div class="divider"></div>
            <div class="menu-item" onclick="filterCategory('Kerja', this)">
                <div class="menu-item-left"><i class="far fa-folder"></i> Kerja</div>
                <div class="menu-count" id="count-kerja">0</div>
            </div>
            <div class="menu-item" onclick="filterCategory('Pribadi', this)">
                <div class="menu-item-left"><i class="far fa-folder"></i> Pribadi</div>
                <div class="menu-count" id="count-pribadi">0</div>
            </div>
            <div class="menu-item" onclick="filterCategory('Kuliah', this)">
                <div class="menu-item-left"><i class="far fa-folder"></i> Kuliah</div>
                <div class="menu-count" id="count-kuliah">0</div>
            </div>
            <div class="divider"></div>
            <div class="menu-item" onclick="filterCategory('Sampah', this)">
                <div class="menu-item-left"><i class="far fa-trash-alt"></i> Sampah</div>
                <div class="menu-count" id="count-trash">0</div>
            </div>
        </div>

        <div class="header">
            <div style="display: flex; align-items: center; gap: 16px;">
                <i class="fas fa-bars" onclick="toggleSidebar()" style="font-size: 20px; cursor: pointer;"></i>
                <h1 id="current-view-title">Semua catatan</h1>
            </div>
            <div class="header-icons">
                <i class="fas fa-search" onclick="toggleSearch()"></i>
                <div style="position: relative; display: inline-block;">
                    <i class="fas fa-ellipsis-v" onclick="toggleViewMenu(event)"></i>
                    <div class="dropdown-menu dropdown-right" id="viewDropdown">
                        <div class="dropdown-header">Lihat</div>
                        <div class="dropdown-item" onclick="changeLayout('kisi')"><i class="fas fa-th-large"></i> Tampilan Kisi</div>
                        <div class="dropdown-item" onclick="changeLayout('daftar')"><i class="fas fa-list"></i> Tampilan Daftar</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="search-container" id="searchContainer">
            <input type="text" class="search-box" id="searchInput" placeholder="Cari catatan..." oninput="searchNotes()">
        </div>

        <div class="content-area">
            <div class="notes-grid layout-kisi" id="notesGrid"></div>
        </div>

        <div class="fab" id="fabBtn" onclick="openModal()">
            <i class="fas fa-pen"></i>
        </div>

        <div class="modal" id="noteModal">
            <div class="modal-header">
                <i class="fas fa-chevron-left" onclick="closeModal()"></i>
                <div style="display: flex; align-items: center; gap: 20px;">
                    <div style="position: relative;">
                        <i class="fas fa-plus" onclick="togglePlusMenu(event)" style="font-size: 20px; cursor: pointer;"></i>
                        <div class="dropdown-menu dropdown-right" id="plusDropdown">
                            <div class="dropdown-item" onclick="triggerImageUpload()"><i class="far fa-image"></i> Gambar</div>
                            <div class="dropdown-item" onclick="openTableModal()"><i class="fas fa-table"></i> Tabel</div>
                            <div class="dropdown-item" onclick="openCanvasModal()"><i class="fas fa-paint-brush"></i> Lukisan</div>
                        </div>
                    </div>
                    <button class="btn-save" onclick="saveNote()">Simpan</button>
                </div>
            </div>
            
            <input type="text" class="input-title" id="noteTitle" placeholder="Judul">
            <select class="select-folder" id="noteFolder">
                <option value="Kerja">Kerja</option>
                <option value="Pribadi">Pribadi</option>
                <option value="Kuliah">Kuliah</option>
            </select>

            <div class="editor-toolbar">
                <button type="button" onclick="formatDoc('bold')" title="Tebal"><i class="fas fa-bold"></i></button>
                <button type="button" onclick="formatDoc('italic')" title="Miring"><i class="fas fa-italic"></i></button>
                <button type="button" onclick="formatDoc('underline')" title="Garis Bawah"><i class="fas fa-underline"></i></button>
                <button type="button" onclick="formatDoc('insertUnorderedList')" title="List"><i class="fas fa-list-ul"></i></button>
            </div>

            <div class="input-body-rich" id="noteBody" contenteditable="true" placeholder="Mulai menulis catatan..."></div>
            
            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="insertImage(event)">
        </div>

<div class="sub-modal" id="canvasModal" style="padding: 0; background: #000;">
    <div class="canvas-container" style="background: #000; height: 100%; display: flex; flex-direction: column;">
        
        <div class="canvas-header" style="background: #111; padding: 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222;">
            <button onclick="closeCanvasModal()" style="background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; padding: 0 8px;"><i class="fas fa-times"></i></button>
            
            <div class="canvas-colors" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 0 auto;">
                <div class="color-dot active" style="background: #85929E; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid #fff;" onclick="changeCanvasColor('#85929E', this)"></div>
                <div class="color-dot" style="background: #2ecc71; width: 28px; height: 28px; border-radius: 50%; cursor: pointer;" onclick="changeCanvasColor('#2ecc71', this)"></div>
                <div class="color-dot" style="background: #e74c3c; width: 28px; height: 28px; border-radius: 50%; cursor: pointer;" onclick="changeCanvasColor('#e74c3c', this)"></div>
                <div class="color-dot" style="background: #2980b9; width: 28px; height: 28px; border-radius: 50%; cursor: pointer;" onclick="changeCanvasColor('#2980b9', this)"></div>
                <div class="color-dot" style="background: #f1c40f; width: 28px; height: 28px; border-radius: 50%; cursor: pointer;" onclick="changeCanvasColor('#f1c40f', this)"></div>
                
                <div class="color-dot" style="background: #34495e; width: 28px; height: 28px; border-radius: 50%; cursor: pointer;" onclick="changeCanvasColor('#34495e', this)"></div>
                <div class="color-dot" style="background: #9b59b6; width: 28px; height: 28px; border-radius: 50%; cursor: pointer;" onclick="changeCanvasColor('#9b59b6', this)"></div>
                <div class="color-dot" style="background: #1abc9c; width: 28px; height: 28px; border-radius: 50%; cursor: pointer;" onclick="changeCanvasColor('#1abc9c', this)"></div>
                <div class="color-dot" style="background: #e67e22; width: 28px; height: 28px; border-radius: 50%; cursor: pointer;" onclick="changeCanvasColor('#e67e22', this)"></div>
                <div class="color-dot" style="background: #ffffff; width: 28px; height: 28px; border-radius: 50%; cursor: pointer;" onclick="changeCanvasColor('#ffffff', this)"></div>
            </div>

            <button onclick="clearCanvas()" style="background: none; border: none; color: #ff4757; font-size: 18px; cursor: pointer; padding: 0 8px;" title="Hapus Total"><i class="fas fa-trash-alt"></i></button>
        </div>

        <div style="flex: 1; background: #fff; position: relative; overflow: hidden;">
            <canvas id="paintCanvas" style="display: block; width: 100%; height: 100%;"></canvas>
        </div>

        <div class="canvas-footer" style="background: #000; padding: 16px; position: relative; display: flex; justify-content: center; align-items: center; min-height: 70px;">
            
            <div style="background: #222; display: flex; align-items: center; gap: 18px; padding: 8px 20px; border-radius: 30px; border: 1px solid #333;">
                <div id="eraserTool" onclick="selectCanvasTool('eraser')" style="color: #aaa; cursor: pointer; font-size: 18px;" title="Penghapus Seret"><i class="fas fa-eraser"></i></div>
                <div onclick="undoCanvas()" style="color: #aaa; cursor: pointer; font-size: 18px;" title="Undo (Kembali)"><i class="fas fa-undo"></i></div>
                <div onclick="redoCanvas()" style="color: #aaa; cursor: pointer; font-size: 18px;" title="Redo (Maju)"><i class="fas fa-redo"></i></div>
                <div id="penTool" class="tool-active-style" onclick="selectCanvasTool('pen')" style="color: #fff; cursor: pointer; font-size: 16px;" title="Mode Pulpen Tipis"><i class="fas fa-pen"></i></div>
                <div id="brushTool" onclick="selectCanvasTool('brush')" style="color: #aaa; cursor: pointer; font-size: 18px;" title="Mode Kuas Tebal"><i class="fas fa-paint-brush"></i></div>
            </div>

            <button onclick="saveCanvasDrawing()" style="position: absolute; right: 16px; background: #333; border: none; color: #fff; padding: 8px 18px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 14px;">Selesai</button>
        </div>
    </div>
</div>

    <script src="app.js"></script>
</body>
</html>
